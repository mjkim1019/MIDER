name: Build Windows EXE

on:
  push:
    branches: [deploy]
    paths:
      - 'mider/**'
      - 'mider.spec'
      - 'requirements.txt'
      - 'scripts/build_exe.py'
      - '.github/workflows/build-windows-exe.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Create .env from secrets
        run: |
          echo "API_PROVIDER=aica" >> .env
          echo "AICA_API_KEY=${{ secrets.AICA_API_KEY }}" >> .env
          echo "AICA_ENDPOINT=${{ secrets.AICA_ENDPOINT }}" >> .env
        shell: bash

      - name: Build EXE
        run: python -m PyInstaller --clean --noconfirm mider.spec

      - name: Verify build
        run: |
          if (Test-Path "dist\mider.exe") {
            Write-Host "Build successful: dist\mider.exe"
            Get-Item "dist\mider.exe" | Select-Object Name, Length
          } else {
            Write-Error "Build failed: mider.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mider-windows-${{ github.sha }}
          path: dist\mider.exe
          retention-days: 30
