# Mider 설정 파일

llm:
  primary_model: "gpt-5"
  fallback_model: "gpt-5-mini"
  mini_model: "gpt-5-mini"
  max_retries: 3
  timeout_seconds: 120

  # gpt-5/gpt-5-mini는 temperature=1(기본값)만 지원
  # Agent별 모델 설정
  # gpt-5: 심층 분석 (Analyzer, Orchestrator)
  # gpt-5-mini: 분류/요약/보고 (Classifier, Collector, Reporter, XML)
  agents:
    orchestrator:
      model: "gpt-5"
      fallback: "gpt-5-mini"
    task_classifier:
      model: "gpt-5-mini"
      fallback: "gpt-5"
    context_collector:
      model: "gpt-5-mini"
      fallback: "gpt-5"
    js_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
    c_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
    proc_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
      # dispatch 그룹핑 줄 수 기준
      group_target_lines: 2000   # 목표 그룹 크기 (줄)
      group_hard_cap_lines: 2400 # 허용 상한 (줄)
    sql_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
    xml_analyzer:
      model: "gpt-5-mini"
      fallback: "gpt-5"
    reporter:
      model: "gpt-4.1-mini"
      fallback: "gpt-4.1"

api:
  provider: "azure"  # "azure" 또는 "openai"
  # Azure OpenAI 설정
  azure_endpoint: ""  # 환경변수 AZURE_OPENAI_ENDPOINT로 설정
  api_version: "2024-12-01-preview"
  # API 키는 환경변수 AZURE_OPENAI_API_KEY로 설정

static_analysis:
  # 경로는 mider 패키지 디렉토리 기준 상대경로 (런타임에 Path(__file__).parent로 resolve)
  eslint:
    config: "resources/lint-configs/.eslintrc.json"
    binary: "resources/binaries/node"
  clang_tidy:
    checks: "-*,clang-analyzer-*,bugprone-*,-bugprone-branch-clone"
    binary: "resources/binaries/clang-tidy"
    stub_extra_types:
      - "typedef unsigned char BYTE;"
      - "typedef unsigned int DWORD;"
      - "#define SUCCESS 0"
      - "#define FAILURE -1"
  proc:
    include_dirs:
      - "/usr/include/oracle"
    binary: "resources/binaries/proc"

output:
  directory: "./output"
  files:
    issue_list: "issue-list.json"
    checklist: "checklist.json"
    summary: "summary.json"

logging:
  level: "INFO"
  format: "rich"
