# Mider 설정 파일

llm:
  primary_model: "gpt-5"
  fallback_model: "gpt-5-mini"
  mini_model: "gpt-5-mini"
  max_retries: 3
  timeout_seconds: 120

  # gpt-5/gpt-5-mini는 temperature=1(기본값)만 지원
  # Agent별 모델 설정
  # gpt-5: 심층 분석 (Analyzer, Orchestrator)
  # gpt-5-mini: 분류/요약/보고 (Classifier, Collector, Reporter, XML)
  agents:
    orchestrator:
      model: "gpt-5"
      fallback: "gpt-5-mini"
    task_classifier:
      model: "gpt-5-mini"
      fallback: "gpt-5"
    context_collector:
      model: "gpt-5-mini"
      fallback: "gpt-5"
    js_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
      group_target_lines: 2000   # 청크 목표 크기 (줄)
      group_hard_cap_lines: 2400 # 청크 허용 상한 (줄)
    c_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
    proc_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
      # dispatch 그룹핑 줄 수 기준
      group_target_lines: 2000   # 목표 그룹 크기 (줄)
      group_hard_cap_lines: 2400 # 허용 상한 (줄)
    sql_analyzer:
      model: "gpt-5"
      fallback: "gpt-5-mini"
    xml_analyzer:
      model: "gpt-5-mini"
      fallback: "gpt-5"
    reporter:
      model: "gpt-4.1-mini"
      fallback: "gpt-4.1"

api:
  provider: "aica"  # SKT AICA LLM Gateway
  # AICA 설정 (환경변수로 설정)
  # AICA_API_KEY: X-AGENT-API-KEY 헤더 값
  # AICA_ENDPOINT: 서버 주소 (예: http://aica.sktelecom.com:3000)
  # AICA_SSO_SESSION: SSO 세션 쿠키 (선택)
  # AICA_USER_ID: 사용자 ID (기본: mider_agent)

  sso:
    # Chrome CDP 포트 (환경변수 CDP_PORT로 override 가능)
    cdp_port: 9222
    session_ttl_hours: 1
    # login_url: 기본값은 {AICA_ENDPOINT}?page=agent_login
    # Chrome 경로 (환경변수 CHROME_PATH로 override 가능, 미설정 시 자동 탐색)

static_analysis:
  # 경로는 mider 패키지 디렉토리 기준 상대경로 (런타임에 Path(__file__).parent로 resolve)
  eslint:
    config: "resources/lint-configs/.eslintrc.json"
    binary: "resources/binaries/node"
  clang_tidy:
    checks: "-*,clang-analyzer-*,bugprone-*,-bugprone-branch-clone"
    binary: "resources/binaries/clang-tidy"
    stub_extra_types:
      - "typedef unsigned char BYTE;"
      - "typedef unsigned int DWORD;"
      - "#define SUCCESS 0"
      - "#define FAILURE -1"
  proc:
    include_dirs:
      - "/usr/include/oracle"
    binary: "resources/binaries/proc"

c_analysis:
  # 경계 검증을 보장하는 프로젝트 자체 함수 접두사.
  # 이 함수들의 반환값이 배열 인덱스/루프 한계값으로 사용될 때
  # "배열 인덱스 경계값 미검증" 류 이슈는 보고하지 않는다.
  # C analyzer + ProC analyzer 양쪽 모두에 적용된다.
  safe_function_prefixes:
    - "mpfm"

output:
  directory: "./output"
  files:
    issue_list: "issue-list.json"
    checklist: "checklist.json"
    summary: "summary.json"

logging:
  level: "INFO"
  format: "rich"
